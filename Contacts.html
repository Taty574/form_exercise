<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
</head>
<body>

    <div class="form-container">
        <h1>Contact Us</h1>
        
        <form action="submit_form.php" method="post">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name">

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email address">

            <label for="phone_address">Phone Number:</label>
            <input type="number" id="phone_address" name="phone_address" placeholder="Enter your phone number">

            <label for="subject">Subject Line:</label>
            <input type="text" id="subject" name="subject" placeholder="Enter subject line">

            <label for="message">Message:</label>
            <textarea id="message" name="message"></textarea>

            <input type="submit" value="Send Message">
        </form>
    </div>

</body>
</html>
